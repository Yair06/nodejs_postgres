name: CI Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (if script exists)
        run: npm run build --if-present

      - name: Test app (if script exists)
        run: npm test --if-present

      - name: Build Docker image
        run: docker build -t nodejs-postgres:${{ github.sha }} .
