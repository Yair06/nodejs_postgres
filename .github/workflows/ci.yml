name: CI Build

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build containers
        run: docker compose build

      - name: Compose up containers
        run: docker compose up -d

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/ ; then
              exit 0
            fi
            echo "API not ready yet..."
            sleep 2
          done
          echo "API did not start in time"
          exit 1

      - name: Test API
        run: curl -f http://localhost:3000/api/
